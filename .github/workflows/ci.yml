name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    name: Backend-test-Jest
    runs-on: ubuntu-latest
    steps:
      # 1.Checkout 
      - name: Checkout
        uses: actions/checkout@v6
      # 2.Setup Runtime 
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # 3.Install dependecies 
      - name: Install dependecies
        run: npm install 
      # 4.Run test for backend 
      - name: Run test
        run: npm run test
  
  build-images:
    name: Build docker image 
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ secrets.DOCKER_USERNAME }}/backend-test:1.0
    steps:
      # 0.Checkout repo so Dockerfile is available
      - name: Checkout
        uses: actions/checkout@v6
      # 1.Add support for more platforms with QEMU (optional)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      # 2.Setup docker buildx
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v4
      - name: See the folder path
        run: |
          pwd
          ls


       # Login karke docker hub pe push kar sakte hai 
      # 4.Docker login
      - name: Login DockerHub
        uses: docker/login-action@v4
        # Use Personal access token for login in docker hub

        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}

        
      # 3.Build and run the image
      # docker build -t buildx build -t backend-test:1.0 
      # cd Git-workFlow
      # docker build -t backend-test:1.0 ./Git-workflow
      - name: Build image (local smoke)
        run: |
          docker build -t "$IMAGE" .
          docker run -d "$IMAGE"


     

      # 5.Docker push to the docker hub image push karnge (use and run me se ek chalega )
      # 1.Simple way manual way (NOT RECOMMENDED)
      # - name: Push to DockerHub
      #   # uses: docker/build-push-action@v4
      #   run: |
      #     docker push ${{secrets.DOCKER_USERNAME}}/backend-test:1.0 



        #2. Build and push (Recommended way)
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          # context: "{{defaultContext}}:mysubdir" 
          tags: ${{ env.IMAGE }}

        # 6.SSH deploy to VPS (EC2) 
          # 1.login to VPS 
      - name: Deploy VPS
        uses: appleboy/ssh-action@v1
        with: 
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: IMAGE
          # port: ${{ secrets.PORT }}
          # 2.Pull the image in vps 
          # 3.docker compose karo 
          # 3.Old container remove before starting new container 
          # Map host 3000 to container 3000 (app listens on 3000)
          # port is already allocated
          script: |
            docker pull $IMAGE
            
            docker stop backend || true
            docker rm backend || true
           
            docker run -d -p "3000:3000" --name backend $IMAGE


  

      # 5.Complition message 
      - name: Note complition
        run: echo "Docker build and push successfull "

      

  
  complete:
    name: complete message
    runs-on: ubuntu-latest
    steps:
      - name: Show message
        run: echo "Completed test of backend"

